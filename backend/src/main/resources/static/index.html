<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PartScan AI</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <section class="scanner">
      <div class="topbar">
        <div>
          <h1>PartScan AI</h1>
          <p id="status">Наведите камеру на деталь</p>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Обновить список" aria-label="Обновить список">↻</button>
      </div>

      <div class="camera-shell">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="frameCanvas" hidden></canvas>
        <img id="previewImage" class="preview-image" alt="Предпросмотр кадра" hidden>
        <div class="scan-frame">
          <span></span><span></span><span></span><span></span>
          <div class="scan-crosshair"></div>
        </div>
        <div class="camera-badges">
          <div id="lightBadge" class="camera-badge">Свет: —</div>
          <div id="sharpBadge" class="camera-badge">Кадр: —</div>
        </div>
        <div id="guidance" class="guidance">Поместите деталь целиком в рамку, маркировку — ближе к центру</div>
      </div>

      <div class="controls">
        <button id="scanButton" class="primary-button" type="button">Сканировать</button>
        <button id="retakeButton" class="secondary-button" type="button" hidden>Переснять</button>
        <button id="retryButton" class="secondary-button" type="button">Камера</button>
      </div>
    </section>

    <section class="results">
      <div class="section-title">
        <div>
          <h2>База деталей</h2>
          <p class="meta">Подтверждайте результат — так база будет становиться точнее</p>
        </div>
        <span id="countLabel">0</span>
      </div>
      <div id="partsList" class="parts-list"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
