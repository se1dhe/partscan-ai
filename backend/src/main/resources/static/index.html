<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PartScan AI</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <section class="scanner">
      <div class="topbar">
        <div>
          <h1>PartScan AI</h1>
          <p id="status">Наведите камеру на деталь</p>
        </div>
        <button id="catalogToggle" class="catalog-button" type="button">База <span id="countLabel">0</span></button>
      </div>

      <div class="angle-strip" id="angleStrip" hidden></div>

      <div class="camera-shell">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="frameCanvas" hidden></canvas>
        <div id="partShapeGuide" class="part-shape-guide shape-main"></div>
        <div class="scan-frame">
          <span></span><span></span><span></span><span></span>
          <div class="scan-crosshair"></div>
        </div>
        <div class="camera-badges">
          <div id="lightBadge" class="camera-badge">Свет: —</div>
          <div id="sharpBadge" class="camera-badge">Кадр: —</div>
        </div>
        <div id="guidance" class="guidance">Поместите деталь целиком в рамку, маркировку — ближе к центру</div>
      </div>

      <div class="controls">
        <button id="scanButton" class="primary-button" type="button">Сканировать</button>
        <button id="multiAngleButton" class="secondary-button" type="button" hidden>Добрать ракурс</button>
        <button id="finishAnglesButton" class="secondary-button" type="button" hidden>Анализировать ракурсы</button>
        <button id="resetAnglesButton" class="secondary-button" type="button" hidden>Сброс</button>
        <button id="retryButton" class="secondary-button" type="button">Камера</button>
      </div>
    </section>

    <aside id="catalogPanel" class="catalog-panel" hidden>
      <div class="catalog-header">
        <div>
          <h2>База деталей</h2>
          <p class="meta">Каталог отдельно от камеры, чтобы не грузить сканер</p>
        </div>
        <button id="catalogClose" class="icon-button" type="button">×</button>
      </div>
      <div id="categoryFilters" class="category-filters"></div>
      <div id="partsList" class="parts-list"></div>
    </aside>
  </main>
  <script src="/app.js"></script>
</body>
</html>
