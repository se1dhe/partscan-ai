<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PartScan AI</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <section class="scanner">
      <div class="camera-shell">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="frameCanvas" hidden></canvas>

        <button id="catalogToggle" class="catalog-button" type="button">База <span id="countLabel">0</span></button>

        <div id="partShapeGuide" class="part-shape-guide shape-main">
          <div id="shapeCaption" class="shape-caption">Деталь целиком</div>
        </div>

        <div class="scan-hint">
          <div id="angleTitle" class="angle-title">Деталь целиком</div>
          <div id="angleHint" class="angle-hint">Поместите деталь в рамку</div>
        </div>

        <div class="bottom-sheet">
          <div id="status" class="status-line">Камера запускается</div>
          <div id="guidance" class="guidance">Наведите камеру и нажмите сканирование</div>
          <div id="angleStrip" class="angle-strip" hidden></div>
          <div class="controls">
            <button id="scanButton" class="primary-button" type="button">Сканировать</button>
            <button id="secondaryActionButton" class="secondary-button" type="button" hidden>Доснять</button>
          </div>
          <button id="resetAnglesButton" class="ghost-button" type="button" hidden>Сбросить досъёмку</button>
        </div>
      </div>
    </section>

    <aside id="catalogPanel" class="catalog-panel" hidden>
      <div class="catalog-header">
        <div>
          <h2>База деталей</h2>
          <p class="meta">Сканы и категории</p>
        </div>
        <button id="catalogClose" class="icon-button" type="button">×</button>
      </div>
      <div id="categoryFilters" class="category-filters"></div>
      <div id="partsList" class="parts-list"></div>
    </aside>
  </main>
  <script src="/app.js"></script>
</body>
</html>
