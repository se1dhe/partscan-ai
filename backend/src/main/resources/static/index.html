<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PartScan AI</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app scan-page">
    <section class="scanner">
      <div class="camera-shell">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="frameCanvas" hidden></canvas>

        <a class="catalog-link" href="/catalog.html">База</a>

        <div id="partShapeGuide" class="part-shape-guide shape-main">
          <div id="shapeCaption" class="shape-caption">держите деталь в контуре</div>
        </div>

        <div class="scan-hint">
          <div id="angleTitle" class="angle-title">Наведи на автодеталь</div>
          <div id="angleHint" class="angle-hint">Захват произойдёт автоматически</div>
        </div>

        <div class="bottom-status">
          <div id="status" class="status-line">Камера запускается</div>
          <div id="guidance" class="guidance">Держите деталь внутри контура</div>
          <div id="progressLine" class="progress-line"><span></span></div>
        </div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
